version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '3652:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ocorrencias
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres
    command: npm run start:prod

volumes:
  postgres_data:
